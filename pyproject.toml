[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "S",   # flake8-bandit (security)
    "RUF", # ruff-specific rules
]
ignore = [
    "S101", # assert statements (used in tests)
    "S603", # subprocess — not used here but suppress for SDK calls
]

[tool.ruff.lint.per-file-ignores]
"scripts/nsg_analyzer.py" = ["T201"]  # Allow print() in CLI tool
"scripts/generate_report.py" = ["T201"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=scripts --cov-report=term-missing"
