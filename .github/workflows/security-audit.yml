name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run weekly to catch configuration drift
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Resource group to audit (overrides env var)"
        required: false

env:
  # Set these in repository secrets / variables for CI use.
  # For local use: az login is sufficient (DefaultAzureCredential handles both).
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AUDIT_RESOURCE_GROUP: ${{ vars.AUDIT_RESOURCE_GROUP || 'azsec-lab-rg' }}

jobs:
  # ── Linting & Static Analysis ─────────────────────────────────────────────────
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Ruff — lint Python
        run: ruff check scripts/

      - name: Ruff — check formatting
        run: ruff format --check scripts/

      - name: Terraform fmt check
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform format check
        run: terraform fmt -check -recursive terraform/

  # ── Terraform Validation ──────────────────────────────────────────────────────
  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform init (no backend)
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: tfsec — IaC security scan
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform
          soft_fail: false

  # ── Secret Scanning ────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — detect secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Live NSG Audit (runs on main branch or manual trigger) ────────────────────
  nsg-audit:
    name: NSG Security Audit
    runs-on: ubuntu-latest
    needs: [lint, validate-terraform]
    # Only run live audit when credentials are available
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    permissions:
      id-token: write   # Required for OIDC authentication to Azure
      contents: read
      security-events: write  # For uploading SARIF results

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC — no stored secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install audit dependencies
        run: pip install -r scripts/requirements.txt

      - name: Set resource group
        id: rg
        run: |
          RG="${{ github.event.inputs.resource_group || env.AUDIT_RESOURCE_GROUP }}"
          echo "resource_group=$RG" >> $GITHUB_OUTPUT

      - name: Run NSG audit
        id: audit
        run: |
          python scripts/nsg_analyzer.py \
            --resource-group "${{ steps.rg.outputs.resource_group }}" \
            --output-json reports/findings.json \
            --fail-on HIGH
        continue-on-error: true  # Capture exit code; evaluate below

      - name: Generate Markdown report
        run: |
          python scripts/generate_report.py \
            --input reports/findings.json \
            --output "reports/AUDIT-$(date +%Y%m%d).md"

      - name: Upload findings as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nsg-audit-findings
          path: reports/
          retention-days: 90

      - name: Fail pipeline on HIGH+ findings
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::error::NSG audit found HIGH or CRITICAL severity findings. Review the uploaded report artifact."
          exit 1
